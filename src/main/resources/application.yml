server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1


springdoc:
  swagger-ui:
    urls:
      - name: AUTH-SERVICE
        url: /auth/v3/api-docs
    enabled: true
  api-docs:
    enabled: true
